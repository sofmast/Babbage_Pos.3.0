
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Products Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* ======================================
RESET
====================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

:root{

--bg:#f8fafc;
--card:#ffffff;
--primary:#eb9525;
--secondary:#64748b;
--text:#1e293b;
--border:#e2e8f0;
--hedas:#838383;

--shadow:
0 6px 24px rgba(15,23,42,.06);

--hover-shadow:
0 10px 30px rgba(15,23,42,.12);

}


/* ======================================
BODY
====================================== */

body{

background:var(--bg);
padding:25px;
color:var(--text);

}

.container{

max-width:1400px;
margin:auto;

}


/* ======================================
HEADER
====================================== */

.header{

display:flex;

justify-content:space-between;
align-items:center;

margin-bottom:25px;

background:var(--card);

padding:20px 25px;

border-radius:18px;

box-shadow:var(--shadow);

gap:20px;

flex-wrap:wrap;

}

.header h1{

font-size:28px;
font-weight:600;

color:#525252;

}

.header div{

display:flex;
gap:12px;
flex-wrap:wrap;

}


/* ======================================
BUTTONS
====================================== */

.btn{

padding:12px 18px;

border-radius:12px;

text-decoration:none;

display:flex;
align-items:center;
gap:10px;

font-weight:600;

transition:.3s;

}

.add{

background:#f1f5f9;
color:#334155;

}

.btn:last-child{

background:var(--primary);
color:white;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:var(--hover-shadow);

}


/* ======================================
SEARCH
====================================== */

.toolbar{

margin-bottom:20px;

}

.toolbar input{

width:100%;

padding:15px;

border:1px solid var(--border);

border-radius:14px;

outline:none;

font-size:15px;

background:white;

box-shadow:var(--shadow);

transition:.3s;

}

.toolbar input:focus{

border-color:var(--primary);

}


/* ======================================
TABLE
====================================== */

.table-wrapper{

background:white;

overflow:auto;

box-shadow:var(--shadow);

}

table{

width:100%;
border-collapse:collapse;

min-width:850px;

}

thead th{

background:#474747;

color:#dddddd;

padding:16px;

font-size:14px;

font-weight:600;

text-align:left;

}

tbody td{

padding:16px;

border-bottom:1px solid #f1f5f9;

}

tbody tr{

transition:.3s;

}

tbody tr:hover{

background:#fafafa;

}


/* ======================================
ACTION BUTTONS
====================================== */

.action-btn{

border:none;

padding:10px;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

.edit-btn{

color:#0ea5e9;

background:white;

border:1px solid #0ea5e9;

}

.delete-btn{

color:#ef4444;

background:white;

border:1px solid #ef4444;

}

.view-btn{

background:#f8fafc;

color:var(--primary);

width:40px;
height:40px;

border:none;

border-radius:10px;

cursor:pointer;

}

.edit-btn:hover,
.delete-btn:hover,
.view-btn:hover{

transform:translateY(-2px);

}


/* ======================================
MODAL
====================================== */

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.5);

justify-content:center;
align-items:center;

z-index:1000;

backdrop-filter:blur(4px);

}

.modal.show{

display:flex;

}

.modal-content{

background:white;

width:95%;
max-width:500px;

padding:25px;

border-radius:18px;

box-shadow:var(--hover-shadow);

animation:dropDown .35s ease;
max-height:90vh;
overflow-y: auto;

}

.modal-content h2{

margin-bottom:20px;

color:#525252;

font-size:22px;

}

.labo{
    color: #9e9e9e;
    font-weight: 400;
    padding: 10px;
}


/* ======================================
INPUTS
====================================== */

.modal-content input{

width:100%;

padding:14px;

margin-bottom:14px;

border:1px solid var(--border);

border-radius:12px;

outline:none;

font-size:14px;

}

.modal-content input:focus{

border-color:var(--primary);

}


/* ======================================
MODAL BUTTONS
====================================== */

.modal-actions{

display:flex;

gap:10px;

}

.modal-actions button{

flex:1;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:600;

transition:.3s;

}

#saveEditBtn{

background:var(--primary);

color:white;

}

#closeModalBtn{

background:#f1f5f9;

}

.modal-actions button:hover{

transform:translateY(-2px);

}


/* ======================================
ACTION MODAL
====================================== */

.action-modal{

max-width:450px;

}

.modal-header{

display:flex;

justify-content:space-between;
align-items:center;

margin-bottom:15px;

}

.klozbat{

border:none;

}

#closeActionModal{

border:none;

background:#f1f5f9;

width:35px;
height:35px;

border-radius:50%;

cursor:pointer;

color:#ef4444;

font-size:18px;

}

.product-details{

margin:20px 0;

}

.product-details p{

padding:14px 0;

display:flex;

justify-content:space-between;

border-bottom:1px solid #eee;

}

.action-buttons{

display:flex;
gap:12px;

}

.action-buttons button{

flex:1;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:600;

}

#editProductBtn{

background:#ecfeff;
color:#0891b2;

}

#deleteProductBtn{

background:#fef2f2;
color:#dc2626;

}


/* ======================================
ANIMATION
====================================== */

@keyframes dropDown{

from{

transform:translateY(-60px);

opacity:0;

}

to{

transform:translateY(0);

opacity:1;

}

}


/* ======================================
RESPONSIVE
====================================== */

@media(max-width:768px){

body{

padding:12px;

}

.header{

flex-direction:column;
align-items:flex-start;

}

.header div{

width:100%;

display:grid;

grid-template-columns:1fr 1fr;

}

.btn{

justify-content:center;

}

}

@media(max-width:500px){

.header div{

grid-template-columns:1fr;

}

}
thead{
    background:#474747;
}
</style>
<link rel="stylesheet" href="CSS/globalModal.css">
</head>

<body>

<div class="container">

<div class="header">

<h1>
Product Management
</h1>

<div>


<a
href="phist.html"
class="btn">
<i class="fas fa-eye"></i>
View Purchses

</a>

<a
href="addProduct.html"
class="btn add">

<i class="fas fa-plus"></i>
Add Product

</a>

<a
href="index.html"
class="btn">
<i class="fas fa-home"></i>
Back To POS

</a>

</div>

</div>

<div class="toolbar">

<input
type="text"
id="productSearch"
placeholder="Search products...">

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Name</th>
<th>Category</th>
<th>Cost</th>
<th>Price</th>
<th>Stock</th>
<th></th>
<th>Actions</th>

</tr>

</thead>

<tbody id="productsTableBody">

</tbody>

</table>

</div>

</div>


<!-- EDIT MODAL -->

<div class="modal"
id="editModal">

<div class="modal-content">

<h2>Edit Product</h2>

<input type="hidden" id="editId">
<h3 class="labo">Name</h3>
<input
type="text"
id="editName"
placeholder="Product Name">
<h3 class="labo">Category</h3>
<input
type="text"
id="editCategory"
placeholder="Category">
<h3 class="labo">Cost</h3>
<input
type="number"
id="editCostPrice"
placeholder="Cost Price">
<h3 class="labo">Selling Price</h3>
<input
type="number"
id="editSellingPrice"
placeholder="Selling Price">
<h3 class="labo">Stock Level</h3>
<input
type="number"
id="editStock"
placeholder="Stock">

<div class="modal-actions">

<button id="saveEditBtn">
Save
</button>

<button id="closeModalBtn">
Cancel
</button>

</div>

</div>

</div>



<!-- PRODUCT ACTION MODAL -->

<div
class="modal"
id="productActionModal">

<div
class="modal-content action-modal">

<div class="modal-header">

<h2 id="actionProductName">

Product

</h2>

<div class="klozbat">

<button
id="closeActionModal">

<i class="fas fa-times"></i>

</button>

</div>

</div>

<div class="product-details">

<p>
<strong>Category:</strong>
<span id="actionCategory"></span>
</p>

<p>
<strong>Cost Price:</strong>
<span id="actionCost"></span>
</p>

<p>
<strong>Selling Price:</strong>
<span id="actionPrice"></span>
</p>

<p>
<strong>Stock:</strong>
<span id="actionStock"></span>
</p>

</div>

<div class="action-buttons">

<button id="editProductBtn">

<i class="fas fa-pen"></i>

Edit

</button>

<button id="deleteProductBtn">

<i class="fas fa-trash"></i>

Delete

</button>

</div>

</div>

</div>



<!--====================================
GLOBAL MODAL
=====================================-->

<div
class="custom-modal"
id="customModal">

    <div class="modal-box">

        <div
        class="modal-icon"
        id="modalIcon">

            <i class="fa fa-check"></i>

        </div>

        <h3 id="modalTitle">

            Success

        </h3>

        <p id="modalMessage">

        </p>

        <button
        class="modal-btn"
        id="closeGlobalModal">

            OK

        </button>

    </div>

</div>

<footer id="babbageFooter"></footer>
<script src="JS/auth.js"></script>
<script src="ADMIN/authEngine.js"></script>
<script src="JS/utils.js"></script>
<script src="JS/globalModal.js"></script>
<script src="ADMIN/stockEngine.js"></script>
<script src="JS/products-page.js"></script>
<script src="ADMIN/soccer.js"></script>


</body>
</html>
