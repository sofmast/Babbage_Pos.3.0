<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Inventory Entry</title>

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
<link rel="stylesheet" href="CSS/addProduct.css">
<link rel="stylesheet" href="CSS/globalModal.css">

</head>

<body>


<!-- MODAL OVERLAY -->

<div class="modal-overlay">

  <form class="form-card" id="productForm">

    <div
      class="success-box"
      id="successBox"
    >
      Inventory item saved successfully.
    </div>

    <h3 class="fom">
      Registration
    <h3>

    <form id="inventoryForm">

      <div class="form-grid">

        <!-- PRODUCT NAME-->

          <div class="form-group">

          <label>Product Name</label>

          <input
          type="text"
          id="productName"
          placeholder="Enter product name"
          required>

          </div>

        <!-- CATEGORY -->
<div class="form-group">

<label>Category</label>

<input
type="text"
id="productCategory"
placeholder="Enter category"
required>

</div>


        <!-- PRICING -->

          <div class="form-group">

          <label>Cost Price</label>

          <input
          type="text"
          id="costPrice"
          placeholder="0.00">

          </div>

          <div class="form-group">

          <label>Selling Price</label>

          <input
          type="text"
          id="sellingPrice"
          placeholder="0.00">

          </div>

        <!-- QUANTITY -->

        <div class="form-group">

        <label>
        Opening Stock Quantity
        </label>

        <input
        type="number"
        id="stockQty"
        placeholder="Enter quantity"
        required value="0">

        </div>

        <!-- COST -->


      </div>

      <!-- ACTIONS -->

      <div class="actions">

        <button
          type="submit"
          class="primary-btn"
        id="submitBtn">
          <i class="fa-solid fa-floppy-disk"></i>
          Save Product
        </button>

<button
type="button"
class="home-btn"
id="homeFormBtn"
>
<i class="fas fa-home"></i>
POS
</button>

<button
type="button"
class="secondary-btn"
id="clearFormBtn"
>
<i class="fas fa-rotate-left"></i>
Clear
</button>

      </div>

      <div class="profit-card">

<div class="profit-item">

<span>Profit Per Unit</span>

<h3 id="profitAmount">
K0.00
</h3>

</div>

<div class="profit-item">

<span>Profit Margin</span>

<h3 id="profitMargin">
0%
</h3>

</div>

</div>

</div>

    </form>

  </div>

</div>

<!-- GLOBAL MODAL -->
<div class="custom-modal" id="customModal">

    <div class="modal-box">

        <div class="modal-icon" id="modalIcon">
            <i class="fas fa-check"></i>
        </div>

        <h2 id="modalTitle">Success</h2>

        <p id="modalMessage">
            Product saved successfully.
        </p>

        <button id="closeGlobalModal" class="modal-btn">
            OK
        </button>

    </div>

</div>

<script src="JS/auth.js"></script>
<script src="ADMIN/authEngine.js"></script>
<script src="JS/globalModal.js"></script>
<script src="JS/addproduct.js"></script>
<script src="ADMIN/soccer.js"></script>
</body>
</html>
