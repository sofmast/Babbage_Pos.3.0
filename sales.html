<div class="container">

class="menu-toggle"
>

<h1>

</h1>

</div>


    <div class="filters">

        <input
            type="text"
            id="searchSale"
            placeholder="Search Receipt">

    </div>

    <div class="stats">

        <div class="card">

            <h3>

                Transactions

            </h3>

            <p id="totalTransactions">
                0
            </p>

        </div>

        <div class="card">

            <h3>

                Revenue

            </h3>

            <p id="totalRevenue">
                K0.00
            </p>

        </div>

        <div class="card">

    <h3>

        Today's Sales

    </h3>

    <p id="todaySales">

        K0.00

    </p>

</div>

<div class="card">

    <h3>

        Monthly Sales

    </h3>

    <p id="monthlySales">

        K0.00

    </p>

</div>

    </div>

  <div
id="salesContainer"
class="sales-grid SalesTable">
</div>

</div>

<!--CONFIRMATION MODAL-->

<div
    class="confirm-modal"
    id="confirmModal">

    <div class="confirm-box">

        <h3 id="confirmTitle">

            Confirm Action

        </h3>

        <p id="confirmMessage">

            Are you sure?

        </p>

        <div class="confirm-actions">

            <button
                id="confirmCancel">

                Cancel

            </button>

            <button
                id="confirmOk">

                OK

            </button>

        </div>

    </div>

</div>

<!--EDIT MODAL-->
<div id="editSaleModal" class="edit-modal">

<div class="edit-box">

<h2 class="hedas-header">
Edit Sale
</h2>

<input
type="hidden"
id="editSaleId">

<div id="editItemsContainer">

</div>

<div class="edit-actions">

<button id="cancelEdit">

Cancel

</button>

<button id="saveEdit">

Save Changes

</button>

</div>

</div>

</div>
<!--END OF CONFIRMATION MODAL-->


<!--====================================
GLOBAL MESSAGE MODAL
=====================================-->

<div
class="custom-modal"
id="customModal">

    <div class="modal-box">

        <div
        class="modal-icon"
        id="modalIcon">

            <i class="fa fa-check"></i>

        </div>

        <h3 id="modalTitle">

            Success

        </h3>

        <p id="modalMessage">

        </p>

        <button
        class="modal-btn"
        id="closeGlobalModal">

            OK

        </button>

    </div>

</div>
