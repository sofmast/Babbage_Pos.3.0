
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Purchase Admin</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.main{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.panel{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:8px 12px;
cursor:pointer;
margin:2px;
}

.receipt{
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
cursor:pointer;
}

.receipt:hover{
background:#eee;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.actions{
display:flex;
gap:5px;
justify-content:center;
}

</style>

</head>

<body>

<h1>Purchase Admin</h1>

<div class="main">

<div class="panel">

<input
id="search"
placeholder="Search supplier or receipt..."
>

<div id="receiptList"></div>

</div>


<div class="panel">

<div id="details">

Select receipt

</div>

</div>

</div>


<script>

function getPurchases(){

return JSON.parse(
localStorage.getItem(
"pos_purchases"
)) || [];

}

function savePurchases(data){

localStorage.setItem(
"pos_purchases",
JSON.stringify(data)
);

}


let selectedId=null;


function calculateTotal(items){

return items.reduce(

(sum,item)=>

sum+

(
(Number(item.qty)||0)
*
(Number(item.costPrice)||0)
),

0

);

}



function renderReceipts(){

const search=

document.getElementById(
"search"
).value.toLowerCase();

const purchases=
getPurchases();

const list=
document.getElementById(
"receiptList"
);

list.innerHTML="";


const filtered=

purchases.filter(

p=>

(p.supplier||"")
.toLowerCase()
.includes(search)

||

(p.id||"")
.toLowerCase()
.includes(search)

);


filtered.forEach(

purchase=>{

const div=
document.createElement(
"div"
);

div.className=
"receipt";

div.innerHTML=`

<b>${purchase.id}</b>

<p>
${purchase.supplier}
</p>

<p>
Items:
${purchase.items?.length||0}
</p>

<p>
Total:
${purchase.total||0}
</p>

<button onclick="
event.stopPropagation();
deleteReceipt(
'${purchase.id}'
)
">

Delete

</button>

`;

div.onclick=()=>{

openReceipt(
purchase.id
);

};

list.appendChild(
div
);

}

);

}



function openReceipt(id){

selectedId=id;

const purchases=
getPurchases();

const purchase=

purchases.find(

p=>p.id===id

);

if(!purchase)return;

const details=

document.getElementById(
"details"
);

details.innerHTML=`

<h2>
${purchase.id}
</h2>

<label>
Supplier
</label>

<input
id="supplierInput"
value="${purchase.supplier||''}"
>

<button
onclick="
updateSupplier()
"
>

Save Supplier

</button>


<h3>
Items
</h3>

<table>

<thead>

<tr>

<th>Name</th>
<th>Qty</th>
<th>Cost</th>
<th>Subtotal</th>
<th>Action</th>

</tr>

</thead>

<tbody>

${
purchase.items.map(

(item,index)=>`

<tr>

<td>

<input
id="name${index}"
value="${
item.name||
item.productName||
''
}"
>

</td>

<td>

<input
type="number"
id="qty${index}"
value="${
item.qty||0
}"
>

</td>

<td>

<input
type="number"
id="cost${index}"
value="${
item.costPrice||0
}"
>

</td>

<td>

${
(item.qty||0)
*
(item.costPrice||0)
}

</td>

<td>

<div class="actions">

<button
onclick="
saveItem(
${index}
)
"
>

Save

</button>

<button
onclick="
deleteItem(
${index}
)
"
>

Delete

</button>

</div>

</td>

</tr>

`

).join("")

}

</tbody>

</table>

<br>

<button
onclick="
addItem()
"
>

Add Item

</button>

<h2>

Total:
<span id="grandTotal">

${calculateTotal(
purchase.items
)}

</span>

</h2>

`;

}



function updateSupplier(){

const purchases=
getPurchases();

const purchase=

purchases.find(
p=>p.id===selectedId
);

purchase.supplier=

document.getElementById(
"supplierInput"
).value;

savePurchases(
purchases
);

renderReceipts();

}



function saveItem(index){

const purchases=
getPurchases();

const purchase=

purchases.find(
p=>p.id===selectedId
);

const item=
purchase.items[index];

item.name=

document.getElementById(
`name${index}`
).value;

item.qty=
Number(

document.getElementById(
`qty${index}`
).value

);

item.costPrice=
Number(

document.getElementById(
`cost${index}`
).value

);

purchase.total=
calculateTotal(
purchase.items
);

savePurchases(
purchases
);

openReceipt(
selectedId
);

renderReceipts();

}



function addItem(){

const purchases=
getPurchases();

const purchase=

purchases.find(
p=>p.id===selectedId
);

purchase.items.push({

id:Date.now(),

name:"New Product",

qty:1,

costPrice:0

});

purchase.total=
calculateTotal(
purchase.items
);

savePurchases(
purchases
);

openReceipt(
selectedId
);

renderReceipts();

}



function deleteItem(index){

const purchases=
getPurchases();

const purchase=

purchases.find(
p=>p.id===selectedId
);


purchase.items.splice(
index,
1
);

purchase.total=
calculateTotal(
purchase.items
);

savePurchases(
purchases
);

openReceipt(
selectedId
);

renderReceipts();

}



function deleteReceipt(id){

if(
!confirm(
"Delete receipt?"
)
)return;

const purchases=
getPurchases();

const updated=

purchases.filter(
p=>p.id!==id
);

savePurchases(
updated
);

document.getElementById(
"details"
).innerHTML=
"Select receipt";

renderReceipts();

}



document
.getElementById(
"search"
)
.addEventListener(

"input",

renderReceipts

);


renderReceipts();

</script>

</body>
</html>
